# PawTrack — production-like local stack: nginx + php-fpm + mysql
# ค่า ${...} ถูกอ่านจากไฟล์ .env ที่ root ของโปรเจกต์โดยอัตโนมัติ
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pawtrack-app
    container_name: pawtrack-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor          # keep image-installed deps (ไม่ให้ bind mount ทับ)
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      # override .env เพื่อชี้ไป service db เสมอ (immutable dotenv จะไม่ทับค่า env นี้)
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-pawtrack}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-pawtrack}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: pawtrack-nginx
    restart: unless-stopped
    ports:
      - "8000:80"                             # เปิดแอปที่ http://localhost:8000
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: pawtrack-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pawtrack}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-pawtrack}
    ports:
      - "3306:3306"                           # เชื่อมจาก host ได้ (เช่น DBeaver)
    volumes:
      - dbdata:/var/lib/mysql
      - ./mysql-config/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-pawtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  vendor:
    driver: local
