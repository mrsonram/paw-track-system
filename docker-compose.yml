# PawTrack — production-like local stack: nginx + php-fpm + mysql
# ค่า ${...} ถูกอ่านจากไฟล์ .env ที่ root ของโปรเจกต์โดยอัตโนมัติ
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pawtrack-app
    container_name: pawtrack-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor          # keep image-installed deps (ไม่ให้ bind mount ทับ)
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      # override .env เพื่อชี้ไป service db เสมอ (immutable dotenv จะไม่ทับค่า env นี้)
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-pawtrack}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-pawtrack}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: pawtrack-nginx
    restart: unless-stopped
    ports:
      # host port 0 = Docker เลือก port ว่างอัตโนมัติ (กันชนกับแอปอื่นบนเครื่อง)
      # อยากปักหมุด: ตั้ง APP_FORWARD_PORT=8000 ใน .env
      # ดู URL จริง:  docker compose port nginx 80
      - "${APP_FORWARD_PORT:-0}:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: pawtrack-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pawtrack}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-pawtrack}
    ports:
      # host port 0 = ให้ Docker เลือก port ว่างอัตโนมัติ (กันชนกับ MySQL อื่นบนเครื่อง)
      # อยากปักหมุดเอง: ตั้ง DB_FORWARD_PORT=3308 ใน .env
      # ดู port จริงที่ได้:  docker compose port db 3306
      - "${DB_FORWARD_PORT:-0}:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./mysql-config/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mysql-config/init:/docker-entrypoint-initdb.d   # สร้าง paw-track-dev + paw-track-prod ตอน init
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-pawtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  vendor:
    driver: local
